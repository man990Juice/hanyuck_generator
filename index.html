<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한역 HTML 변환기</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <div class="logo-container">
      <div class="logo-icon">T</div>
      <div class="logo-text">
        <h1>한역 HTML 변환기</h1>
        <p>트위터 타래 스타일 대화록 생성 및 편집 도구</p>
      </div>
    </div>
    <div style="font-size: 12px; color: var(--text-muted); font-weight: 500;">
      v1.0.0
    </div>
  </header>

  <div class="app-container">
    <!-- Left Panel: Control Panel -->
    <div class="control-panel">

      <!-- Section 1: Data Import & Export -->
      <div class="panel-section">
        <h2 class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
          TXT 파일 입출력
        </h2>

        <div style="margin-bottom: 20px;">
          <h3 style="font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">대화 파일 가져오기</h3>
          <div class="file-dropzone" id="txt-dropzone">
            <input type="file" id="txt-file-input" accept=".txt">
            <span class="dropzone-icon">📥</span>
            <p class="dropzone-text">대화 텍스트 파일을 드래그하거나 클릭하여 로드</p>
            <p class="dropzone-subtext">구분자 '---'를 기준으로 대화가 파싱됩니다.</p>
          </div>
          <div id="loaded-txt-info" style="display: none;">
            <div class="loaded-file-info">
              <span class="loaded-file-name" id="txt-file-name">filename.txt</span>
              <span style="color: var(--text-muted);" id="txt-file-size">0 KB</span>
            </div>
          </div>
        </div>

        <div>
          <h3 style="font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px;">캐릭터 설정 파일 가져오기
          </h3>
          <div style="display: flex; flex-direction: column; gap: 12px;">
            <div class="file-dropzone" id="config-dropzone" style="padding: 16px 12px;">
              <input type="file" id="config-file-input" accept=".txt">
              <p class="dropzone-text" style="font-size: 11px;">설정 TXT 불러오기</p>
            </div>
            <button class="btn btn-outline btn-block" id="btn-export-config">
              💾 캐릭터 설정 TXT 내보내기
            </button>
          </div>
        </div>
      </div>

      <!-- Character Settings -->
      <div class="panel-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h2 class="section-title" style="margin-bottom: 0;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            캐릭터 프로필 설정
          </h2>
          <button class="btn btn-outline" id="btn-add-char" style="padding: 4px 10px; font-size: 11px;">
            + 추가
          </button>
        </div>

        <div class="character-list" id="character-list-container">
          <!-- Character cards will be dynamically generated here -->
        </div>
      </div>

      <!-- Section 3: Page Settings -->
      <div class="panel-section">
        <h2 class="section-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
          출력 페이지 설정
        </h2>
        <div class="page-settings-grid">
          <div class="form-group">
            <label for="page-bg-color">대화창 자체 배경색 (Thread Card)</label>
            <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap;">
              <div class="color-input-wrapper" style="width: auto; flex: 1; min-width: 120px; max-width: 160px;">
                <input type="color" id="page-bg-color" value="#f5f5f5">
                <input type="text" id="page-bg-color-text" value="#f5f5f5" style="max-width: 80px;">
              </div>
              <div class="preset-colors" style="display: flex; gap: 6px;">
                <button type="button" class="color-chip" data-color="#f5f5f5" title="라이트 (#f5f5f5)"
                  style="background-color: #f5f5f5;"></button>
                <button type="button" class="color-chip" data-color="#070e27" title="다크 네이비 (#070e27)"
                  style="background-color: #070e27;"></button>
                <button type="button" class="color-chip" data-color="#7f8c8d" title="그레이 (#7f8c8d)"
                  style="background-color: #7f8c8d;"></button>
              </div>
            </div>
          </div>
          <div class="input-row" style="margin-top: 10px; align-items: flex-end;">
            <div class="form-group">
              <label for="profile-shape">프로필 사진 프레임 모양</label>
              <select id="profile-shape">
                <option value="circle" selected>동그라미 (원형)</option>
                <option value="square">사각 (모서리 둥글게)</option>
              </select>
            </div>
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 8px; margin-bottom: 10px;">
              <input type="checkbox" id="profile-border" style="width: 16px; height: 16px; cursor: pointer; margin: 0;">
              <label for="profile-border"
                style="cursor: pointer; user-select: none; font-size: 12px; color: var(--text-main); white-space: nowrap; margin: 0;">프로필
                테두리 추가</label>
            </div>
          </div>
          <div class="input-row" style="margin-top: 10px;">
            <div class="form-group" style="flex-direction: row; align-items: center; gap: 8px; margin-bottom: 5px;">
              <input type="checkbox" id="show-handle" style="width: 16px; height: 16px; cursor: pointer; margin: 0;">
              <label for="show-handle"
                style="cursor: pointer; user-select: none; font-size: 12px; color: var(--text-main); white-space: nowrap; margin: 0;">캐릭터
                아이디 표시</label>
            </div>
          </div>
          <div class="form-group" style="margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="intro-narrative">서두</label>
              <div class="formatting-toolbar" style="display: flex; gap: 4px; margin-bottom: 2px;">
                <button type="button" class="btn btn-outline format-btn" data-target="intro-narrative"
                  data-format="bold" style="padding: 2px 8px; font-size: 11px; font-weight: bold;">B</button>
                <button type="button" class="btn btn-outline format-btn" data-target="intro-narrative"
                  data-format="italic" style="padding: 2px 8px; font-size: 11px; font-style: italic;">I</button>
              </div>
            </div>
            <textarea id="intro-narrative" rows="2" placeholder="예: 대화를 시작합니다."></textarea>
          </div>
          <div class="form-group" style="margin-top: 10px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <label for="outro-narrative">후두</label>
              <div class="formatting-toolbar" style="display: flex; gap: 4px; margin-bottom: 2px;">
                <button type="button" class="btn btn-outline format-btn" data-target="outro-narrative"
                  data-format="bold" style="padding: 2px 8px; font-size: 11px; font-weight: bold;">B</button>
                <button type="button" class="btn btn-outline format-btn" data-target="outro-narrative"
                  data-format="italic" style="padding: 2px 8px; font-size: 11px; font-style: italic;">I</button>
              </div>
            </div>
            <textarea id="outro-narrative" rows="2" placeholder="예: 대화가 종료되었습니다."></textarea>
          </div>
        </div>
      </div>

    </div>

    <!-- Right Panel: Live Preview & Generated Code -->
    <div class="preview-panel">
      <div class="preview-header">
        <div class="tab-container">
          <div class="tab active" data-tab="preview">실시간 프리뷰</div>
          <div class="tab" data-tab="code">HTML 코드</div>
        </div>
        <div class="preview-actions">
          <button class="btn btn-outline" id="btn-copy-html">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            코드 복사
          </button>
          <button class="btn btn-primary" id="btn-save-html">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <polyline points="17 21 17 13 7 13 7 21"></polyline>
              <polyline points="7 3 7 8 15 8"></polyline>
            </svg>
            HTML 저장
          </button>
        </div>
      </div>

      <!-- Tab Content: Live Preview -->
      <div class="tab-content active" id="tab-content-preview">
        <!-- iframe renders preview dynamically -->
        <iframe class="iframe-preview" id="preview-iframe"></iframe>
      </div>

      <!-- Tab Content: Raw Code -->
      <div class="tab-content" id="tab-content-code">
        <div class="code-viewer-container">
          <textarea class="code-viewer" id="code-textarea" readonly></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Notification Center -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
